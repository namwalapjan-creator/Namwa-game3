<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ภารกิจเรียงลำดับวงจรชีวิตแมลงปอ</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap');
    *{box-sizing:border-box}
    body{
      margin:0; font-family:'Sarabun',sans-serif;
      min-height:100vh; background:linear-gradient(#d9f6ff,#e9ffd6);
      display:flex; justify-content:center; align-items:center; padding:16px;
      color:#22515a;
    }
    .game{
      width:min(960px,100%); background:#ffffffee; border-radius:28px;
      box-shadow:0 12px 35px #4e8f9b55; overflow:hidden; border:6px solid #b9ecff;
    }
    header{
      background:linear-gradient(135deg,#43c6e8,#9eea75);
      color:white; padding:18px 22px; text-align:center; position:relative;
    }
    h1{margin:0;font-size:clamp(24px,4vw,40px);font-weight:800;text-shadow:2px 2px 0 #1889a5}
    .subtitle{font-size:clamp(16px,2.5vw,22px);font-weight:700;margin-top:6px}
    .content{padding:20px}
    .instruction{
      background:#fff8c9; border:3px dashed #ffc857; border-radius:18px;
      padding:12px 16px; font-size:clamp(16px,2.4vw,22px); font-weight:700; text-align:center;
      margin-bottom:18px;
    }
    .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
    .card{
      background:#f7feff; border:4px solid #69cdf0; border-radius:18px; min-height:180px;
      display:flex; flex-direction:column; align-items:center; justify-content:space-between;
      padding:12px; position:relative; box-shadow:0 5px 0 #9de0f2;
    }
    .num{
      position:absolute; right:10px; top:10px; width:34px; height:34px; border-radius:50%;
      background:#23aee7; color:white; display:flex; align-items:center; justify-content:center;
      font-weight:800; font-size:20px;
    }
    .emoji{font-size:clamp(54px,8vw,82px); line-height:1; margin-top:20px}
    .label{font-weight:800;font-size:clamp(14px,2vw,18px);text-align:center;background:#eafff2;border-radius:12px;padding:6px 10px;width:100%}
    .answer-box{
      background:#e8f8ff; border-radius:22px; padding:18px; border:4px solid #b6eaff;
      text-align:center;
    }
    .answer-title{font-size:clamp(18px,3vw,26px);font-weight:800;margin-bottom:12px;color:#186b7b}
    .inputs{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;margin-bottom:16px}
    input{
      width:58px;height:58px;border-radius:50%;border:4px solid #61c7e8;background:white;text-align:center;
      font-size:26px;font-weight:800;color:#22515a;outline:none;
    }
    input.correct{background:#c8ffd3;border-color:#22b14c;color:#12752e}
    input.wrong{background:#ffd1d1;border-color:#e53935;color:#b71c1c;animation:shake .25s 2}
    .arrow{font-size:28px;font-weight:800;color:#34a6c8}
    .buttons{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    button{
      border:none;border-radius:999px;padding:12px 26px;font-size:22px;font-weight:800;cursor:pointer;
      box-shadow:0 5px 0 #177a94; color:white; background:#22aee4;
      font-family:'Sarabun',sans-serif;
    }
    button.secondary{background:#80c45e;box-shadow:0 5px 0 #4d8c34}
    .result{min-height:42px;font-size:clamp(20px,3vw,30px);font-weight:800;text-align:center;margin-top:14px}
    .pond{position:absolute;inset:auto 0 0 0;height:28px;background:rgba(255,255,255,.25)}
    .teacher-note{font-size:14px;text-align:center;color:#5b7b80;margin-top:12px}
    @keyframes shake{0%{transform:translateX(0)}25%{transform:translateX(-5px)}50%{transform:translateX(5px)}75%{transform:translateX(-5px)}100%{transform:translateX(0)}}
    @media(max-width:700px){.cards{grid-template-columns:repeat(2,1fr)}.card{min-height:155px}input{width:50px;height:50px}.arrow{font-size:22px}}
  </style>
</head>
<body>
  <main class="game">
    <header>
      <h1>ภารกิจเรียงลำดับ</h1>
      <div class="subtitle">ขั้นตอนการเติบโตของแมลงปอ</div>
      <div class="pond"></div>
    </header>
    <section class="content">
      <div class="instruction">ดูภาพทั้ง 6 ภาพ แล้วกรอกเลขใต้ภาพตามลำดับวงจรชีวิตแมลงปอให้ถูกต้อง</div>
      <div id="cards" class="cards"></div>
      <div class="answer-box">
        <div class="answer-title">ลำดับการเติบโตที่ถูกต้อง คือ</div>
        <div class="inputs" id="inputs"></div>
        <div class="buttons">
          <button onclick="checkAnswer()">ตอบ</button>
          <button class="secondary" onclick="newGame()">เล่นใหม่</button>
        </div>
        <div id="result" class="result"></div>
      </div>
    </section>
  </main>

<script>
const lifecycle = [
  { step:1, emoji:'🪷', text:'แมลงปอวางไข่ในน้ำ' },
  { step:2, emoji:'🥚', text:'ไข่แมลงปอ' },
  { step:3, emoji:'🐣', text:'ตัวอ่อนฟักออกจากไข่' },
  { step:4, emoji:'🦐', text:'ตัวอ่อนเจริญเติบโตในน้ำ' },
  { step:5, emoji:'🌿', text:'ตัวอ่อนลอกคราบขึ้นจากน้ำ' },
  { step:6, emoji:'🪰', text:'แมลงปอตัวเต็มวัย' }
];
let currentCards = [];
let answer = [];

function shuffle(arr){ return [...arr].sort(()=>Math.random()-0.5); }
function speak(text){
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'th-TH'; utter.rate = 0.9; utter.pitch = 1.1;
  window.speechSynthesis.speak(utter);
}
function newGame(){
  currentCards = shuffle(lifecycle).map((item,index)=>({...item, cardNo:index+1}));
  answer = lifecycle.map(item => currentCards.find(c=>c.step===item.step).cardNo);
  document.getElementById('cards').innerHTML = currentCards.map(c=>`
    <div class="card">
      <div class="num">${c.cardNo}</div>
      <div class="emoji">${c.emoji}</div>
      <div class="label">${c.text}</div>
    </div>`).join('');
  document.getElementById('inputs').innerHTML = Array.from({length:6},(_,i)=>`
    <input maxlength="1" inputmode="numeric" id="ans${i}" oninput="moveNext(${i})">
    ${i<5?'<span class="arrow">→</span>':''}
  `).join('');
  document.getElementById('result').textContent = '';
}
function moveNext(i){
  const el = document.getElementById('ans'+i);
  el.value = el.value.replace(/[^1-6]/g,'');
  el.className='';
  if(el.value && i<5) document.getElementById('ans'+(i+1)).focus();
}
function checkAnswer(){
  let allCorrect = true;
  for(let i=0;i<6;i++){
    const el = document.getElementById('ans'+i);
    const value = Number(el.value);
    if(value === answer[i]) el.className = 'correct';
    else { el.className = 'wrong'; allCorrect = false; }
  }
  const result = document.getElementById('result');
  if(allCorrect){
    result.textContent = 'ถูกต้อง เก่งมาก! 🎉'; result.style.color = '#159447';
    speak('ถูกต้อง เก่งมาก');
    confetti();
  }else{
    result.textContent = 'ยังไม่ถูกต้องนะ ลองใหม่อีกครั้ง'; result.style.color = '#d92525';
    speak('ยังไม่ถูกต้องนะ');
  }
}
function confetti(){
  for(let i=0;i<28;i++){
    const s=document.createElement('span');
    s.textContent=['🌟','✨','💚','🦋','🎉'][Math.floor(Math.random()*5)];
    s.style.position='fixed'; s.style.left=Math.random()*100+'vw'; s.style.top='-30px';
    s.style.fontSize=(20+Math.random()*24)+'px'; s.style.zIndex=9999;
    s.style.transition='transform 1.8s linear, opacity 1.8s';
    document.body.appendChild(s);
    requestAnimationFrame(()=>{s.style.transform=`translateY(${100+Math.random()*70}vh) rotate(${Math.random()*360}deg)`;s.style.opacity='0'});
    setTimeout(()=>s.remove(),1900);
  }
}
newGame();
</script>
</body>
</html>
